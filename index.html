<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지점 지도 · 은행 디지털 전환 DSS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />

<link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

  <div id="loading-overlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <p id="loading-text">데이터를 불러오는 중입니다…</p>
      <div class="loading-bar-track"><div class="loading-bar-fill" id="loading-bar"></div></div>
    </div>
  </div>

  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">DSS</span>
      <div class="brand-text">
        <h1>은행 디지털 전환 의사결정 지원 대시보드</h1>
        <p>사전영향평가 · 지점 근접성 · ITM 대기행렬 시뮬레이션</p>
      </div>
    </div>
    <nav class="tabs">
      <a class="nav-link tab-btn" href="index.html">지점 지도</a>
      <a class="nav-link tab-btn" href="table.html">행정동 취약점수</a>
      <a class="nav-link tab-btn" href="simulator.html">ITM 설치 시뮬레이터</a>
    </nav>
  </header>

  <section class="view">
    <aside class="sidebar">
      <div class="sidebar-block">
        <h2>필터</h2>

        <label class="field">
          <span>지역(시도)</span>
          <select id="f-sido"><option value="">전체</option></select>
        </label>

        <label class="field">
          <span>지점 유형</span>
          <select id="f-type">
            <option value="">전체</option>
            <option value="영업점(창구+ATM)">영업점(창구+ATM)</option>
            <option value="ATM전용">ATM전용</option>
          </select>
        </label>

        <label class="field">
          <span>대기시간 색상 기준</span>
          <select id="f-colorby">
            <option value="wait">평균 대기시간(대표)</option>
            <option value="type">지점 유형</option>
          </select>
        </label>

        <div class="field checkbox-field">
          <label><input type="checkbox" id="f-showpairs" checked> 클릭 시 10km 이내 동일회사 지점 연결선 표시</label>
        </div>
      </div>

      <div class="sidebar-block stats-block">
        <h2>요약</h2>
        <div class="stat-grid" id="stat-grid">
          <div class="stat-card"><span class="stat-num" id="stat-count">–</span><span class="stat-label">표시 중인 지점</span></div>
          <div class="stat-card"><span class="stat-num" id="stat-wait">–</span><span class="stat-label">평균 대기시간(분)</span></div>
          <div class="stat-card"><span class="stat-num" id="stat-atm">–</span><span class="stat-label">ATM전용 비중</span></div>
          <div class="stat-card"><span class="stat-num" id="stat-pairs">–</span><span class="stat-label">10km 인접쌍(선택 지역)</span></div>
        </div>
      </div>

      <div class="sidebar-block legend-block">
        <h2>범례 · 대기시간(분)</h2>
        <div class="legend-scale">
          <span class="dot" style="background:#2E7D5B"></span> 0–3
          <span class="dot" style="background:#8CB84B"></span> 3–6
          <span class="dot" style="background:#E8B23D"></span> 6–10
          <span class="dot" style="background:#DE7A3A"></span> 10–15
          <span class="dot" style="background:#C6432E"></span> 15+
        </div>
      </div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>

      <div class="detail-panel" id="detail-panel">
        <button class="detail-close" id="detail-close" aria-label="닫기">✕</button>
        <div id="detail-content"><p class="detail-empty">지도에서 지점을 클릭하면 상세 정보가 여기에 표시됩니다.</p></div>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
